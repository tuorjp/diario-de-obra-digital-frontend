<div class="page-card">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h2>Diários de Obra</h2>
    </div>
    <button class="btn-novo-diario" (click)="onAddDiario()">
      <span class="btn-plus">+</span> Novo Diário
    </button>
  </div>

  <!-- Search and Sort Controls (Filters) -->
  <div class="controls-bar">
    <div class="search-group">
      <div class="search-input-wrap">
        <input type="number" class="search-input" placeholder="ID da Obra" [(ngModel)]="filterObra" />
      </div>
      <div class="search-input-wrap" style="margin-left: 10px;">
        <input type="date" class="search-input date-input" [(ngModel)]="filterData" />
      </div>
      <div class="search-input-wrap" style="margin-left: 10px;">
        <input type="number" class="search-input" placeholder="ID do Autor" [(ngModel)]="filterAutor" />
      </div>
    </div>
    
    <div style="display: flex; gap: 10px;">
      <button class="btn-sort-code" (click)="onFilterChange()" style="background: #122640; color: white;">
        Listar
      </button>
      <button class="btn-sort-code" (click)="clearFilters()" style="color: #b91c1c;">
        Limpar
      </button>
    </div>
  </div>

  <!-- Table -->
  <div *ngIf="loading" class="status-state">
    <div class="spinner"></div>
    <p>Carregando diários...</p>
  </div>

  <div *ngIf="!loading && diarios.length === 0" class="status-state">
    <p class="status-msg">Nenhum diário encontrado.</p>
  </div>

  <div class="table-wrapper" *ngIf="!loading && diarios.length > 0">
    <table class="tabela-diarios">
      <thead>
        <tr>
          <th class="col-id">ID</th>
          <th class="col-nome">Nome da Obra</th>
          <th class="col-data">Data do Diário</th>
          <th class="col-autor">Autor</th>
          <th class="col-status">Status</th>
          <th class="col-acoes">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let diario of diarios">
          <td class="col-id">{{ diario.id }}</td>
          <td class="col-nome">{{ diario.projeto }}</td>
          <td class="col-data">{{ diario.data | date:'dd/MM/yyyy' }}</td>
          <td class="col-autor">{{ diario.nomeAutor }}</td>
          <td class="col-status">
            <span class="badge" 
              [class.badge-ativa]="diario.status === 'VALIDO'" 
              [class.badge-inativa]="diario.status === 'INVALIDO'"
              [class.badge-pendente]="diario.status === 'AGUARDANDO_AVALIACAO'">
              {{ diario.status }}
            </span>
          </td>
          <td class="col-acoes">
            <button class="action-btn" *ngIf="canEdit(diario)" title="Editar" [routerLink]="['/diarios/edit', diario.id]">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </button>
            <button class="action-btn action-btn--approve" *ngIf="canApproveReject(diario)" title="Aprovar" (click)="onAprovar(diario)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </button>
            <button class="action-btn action-btn--reject" *ngIf="canApproveReject(diario)" title="Reprovar" (click)="onReprovar(diario)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <button class="action-btn action-btn--delete" *ngIf="canDelete(diario)" title="Excluir" (click)="onDelete(diario)">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
                <path d="M10 11v6M14 11v6" />
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="!loading && totalPages > 1">
    <button class="page-btn" (click)="firstPage()" [disabled]="page === 0" title="Primeira página">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="11 17 6 12 11 7" />
        <polyline points="18 17 13 12 18 7" />
      </svg>
    </button>
    <button class="page-btn" (click)="prevPage()" [disabled]="page === 0" title="Página anterior">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <span class="page-info">{{ page + 1 }} de {{ totalPages }}</span>
    <button class="page-btn" (click)="nextPage()" [disabled]="page >= totalPages - 1" title="Próxima página">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
    <button class="page-btn" (click)="lastPage()" [disabled]="page >= totalPages - 1" title="Última página">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="13 17 18 12 13 7" />
        <polyline points="6 17 11 12 6 7" />
      </svg>
    </button>
  </div>

</div>
